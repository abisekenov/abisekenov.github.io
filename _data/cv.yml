    Publications:
      - title: Cluster membership analysis with supervised learning and N-body simulations 
        authors:
          - Abylay Bissekenov
          - Mukhagali Kalambay 
          - Ernazar Abdikamalov
          - Xiaoying Pang
          - Peter Berczik
          - Bekdaulet Shukirgaliyev
        publisher: Astronomy and Astrophysics
        releaseDate: Sep 2024
        url: https://ui.adsabs.harvard.edu/abs/2024A&A...689A.282B
        summary: In this paper, we have applied supervised ML algorithms on N-body simulations for membership analysis of star clusters. Random forest model trained on simulations proved to be capable of obtaining membership with good completeness just by astrometric features. 

      - title: Evolution of star clusters with initial bulk rotation via N-body simulations 
        authors:
          - Abylay Bissekenov
          - Xiaoying Pang
          - Kamlah Albrecht
          - M. B. N. Kouwenhoven
          - Rainer Spurzem
          - Bekdaulet Shukirgaliyev
          - Mirek Giersz
          - Abbas Askar
          - Peter Berczik
        publisher: Astronomy and Astrophysics
        releaseDate: Jul 2025
        url: https://ui.adsabs.harvard.edu/abs/2025A&A...699A.196B
        summary: In this paper, we have combined Fokker-Plank initial models with N-body simulations in order to simulate clusters with initial bulk rotation. Dynamic evolution of these clusters significantly differ from models without initial rotation with development of bar like structure. The morphology of the models were also compared to 93 observed open clusters.

      - title: Formation and Disruption of Wide Binaries in Star Clusters Revealed by N-body Simulations
        authors:
          - Abylay Bissekenov
          - Xiaoying Pang
          - Rainer Spurzem
          - Bekdaulet Shukirgaliyev
          - Mukhagali Kalambay 
          - Peter Berczik
        publisher: The Astrophysical Journal Letters
        releaseDate: Apr 2026
        url: https://ui.adsabs.harvard.edu/abs/2026ApJ..1001L..33B
        summary: Continuation of a second paper, but instead of using only hard binaries, we also added soft binaries that tend to be wide. The simulations showed high number of dynamic disruptions and formations of wide binaries. We proposed 2 semi-analytical models of wide binary evolution in star clusters. 
